services:
  - type: web
    name: leadedly
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: node dist/index.cjs
    healthCheckPath: /api/industries
    autoDeploy: true

    disk:
      name: leadedly-data
      mountPath: /data
      sizeGB: 1

    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /data/leadedly.db
      - key: PLAID_ENV
        value: production
      - key: OTP_FROM_EMAIL
        value: noreply@leadedly.com
      - key: OTP_FROM_NAME
        value: Leadedly
      - key: PLAID_CLIENT_ID
        sync: false
      - key: PLAID_SECRET
        sync: false
      - key: PLAID_TRANSFER_ORIGINATION_ACCOUNT_ID
        sync: false
      - key: RESEND_API_KEY
        sync: false
