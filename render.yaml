services:
  - type: web
    name: leadedly
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: node dist/index.cjs
    healthCheckPath: /api/industries
    autoDeploy: true

    disk:
      name: leadedly-data
      mountPath: /data
      sizeGB: 1

    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /data/leadedly.db
      - key: PLAID_ENV
        value: production
      - key: OTP_FROM_EMAIL
        value: noreply@leadedly.com
      - key: OTP_FROM_NAME
        value: Leadedly
      - key: PLAID_CLIENT_ID
        sync: false
      - key: PLAID_SECRET
        sync: false
      - key: PLAID_TRANSFER_ORIGINATION_ACCOUNT_ID
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: TELNYX_API_KEY
        sync: false
      - key: TELNYX_FROM_NUMBER
        sync: false
      - key: TELNYX_MESSAGING_PROFILE_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GOOGLE_SHEETS_CALL_REQUEST_ID
        value: 1-nF4_X7r1kdyVZVr4pu_NDA-B9jwp3MxAg8jss8SdmY
      # SendBlue iMessage (replaces Telnyx)
      - key: SENDBLUE_API_KEY
        sync: false
      - key: SENDBLUE_API_SECRET
        sync: false
      - key: SENDBLUE_FROM_NUMBER
        sync: false
